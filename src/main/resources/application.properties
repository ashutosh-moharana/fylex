# 1. Database Connection URL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fylex}

# 2. PostgreSQL Driver Class
spring.datasource.driver-class-name=org.postgresql.Driver

# 3. Database Credentials (Use environment variables for security)
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:859710}

# 4. Hibernate/JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# 5. File Upload Configuration
app.upload.dir=${UPLOAD_DIR:./uploads}
app.max-file-size=52428800
app.allowed-extensions=pdf,docx,xlsx,jpg,png,txt,ppt,pptx

# 6. Server Configuration
server.servlet.context-path=/
server.port=8080

# 7. Logging Configuration
logging.level.root=INFO
logging.level.com.ashutosh.fylex=DEBUG

